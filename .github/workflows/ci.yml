name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  DX_VERSION: 0.7.9

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Create Tailwind CSS stub
        run: touch ptcgp-db/public/tailwind.css
      - name: Clippy (native)
        run: cargo clippy --workspace -- -D warnings
      - name: Clippy (web)
        run: cargo clippy -p ptcgp-db --target wasm32-unknown-unknown --features web -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Create Tailwind CSS stub
        run: touch ptcgp-db/public/tailwind.css
      - name: Test
        run: cargo test --workspace
        env:
          RUSTFLAGS: -D warnings

  wasm-test:
    name: WASM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: browser-actions/setup-chrome@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: WASM Tests
        run: wasm-pack test --headless --chrome ptcgp-db-core
        env:
          RUSTFLAGS: -D warnings

  dx-fmt:
    name: RSX Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache dx binary
        id: cache-dx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/dx
          key: dx-${{ runner.os }}-${{ env.DX_VERSION }}
      - name: Install dx
        if: steps.cache-dx.outputs.cache-hit != 'true'
        run: cargo install dioxus-cli --version ${{ env.DX_VERSION }} --locked
      - name: Check RSX formatting
        run: dx fmt --check -p ptcgp-db

  dx-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Cache dx binary
        id: cache-dx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/dx
          key: dx-${{ runner.os }}-${{ env.DX_VERSION }}
      - name: Install dx
        if: steps.cache-dx.outputs.cache-hit != 'true'
        run: cargo install dioxus-cli --version ${{ env.DX_VERSION }} --locked
      - name: Cache dx tools
        uses: actions/cache@v4
        with:
          path: ~/.local/share/.dx/tools
          key: dx-tools-${{ runner.os }}-${{ env.DX_VERSION }}
      - name: Build web
        run: dx build -p ptcgp-db --platform web

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
