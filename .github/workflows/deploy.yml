name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  DX_VERSION: 0.7.9

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute submodule hash
        run: echo "SUBMODULE_HASH=$(git submodule status | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.SUBMODULE_HASH }}
          cache-all-crates: "true"

      - name: Cache dx binary
        id: cache-dx
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/dx
          key: dx-${{ runner.os }}-${{ env.DX_VERSION }}

      - name: Install dx
        if: steps.cache-dx.outputs.cache-hit != 'true'
        run: cargo install dioxus-cli --version ${{ env.DX_VERSION }} --locked

      - name: Cache dx tools
        uses: actions/cache@v5
        with:
          path: ~/.local/share/.dx/tools
          key: dx-tools-${{ runner.os }}-${{ env.DX_VERSION }}

      - name: Set base path for GitHub Pages
        run: sed -i '/^\[web\.app\]/a base_path = "ptcgp-db"' ptcgp-db/Dioxus.toml

      - name: Build web
        run: dx build -p ptcgp-db --platform web --release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./target/dx/ptcgp-db/release/web/public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
